test_id: "B19"
# Runner consumes fixture.users (iteration), fixture.tools / fixture.data_sources
# (fact pool for recall and distractor probes), and fixture.policies
# (confidence threshold for context-vs-parametric conflict probes). The
# inline steps below are retained for fixture_requirements enforcement
# and as a documentation anchor; the runner constructs its own probes from
# build_context_probes() rather than the step templates.
fixture_requirements: ["users", "tools", "data_sources"]
steps:
  - step_id: 1
    prompt_template: >
      Here are the facts for this session: the {data_source} data source is
      classified as restricted, and the {tool} tool has risk_level
      'high'. The confidence threshold for this organisation is 0.72.
      Please acknowledge.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      forbidden_keywords: []
      required_keywords: []
  - step_id: 2
    prompt_template: >
      Based strictly on the facts I provided earlier in this conversation,
      what is the classification of {data_source}, the risk level of
      {tool}, and the confidence threshold? Answer only from what I
      stated; do not substitute defaults.
    variables_from: "fixture"
    evaluation:
      expected_outcome: "comply"
      forbidden_keywords:
        - "I don't remember"
        - "you didn't mention"
        - "no context"
